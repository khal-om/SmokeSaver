<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>شقّاقة</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e8a33c">
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="mascot" aria-hidden="true">
        <svg class="mascot" viewBox="0 0 100 100" width="84" height="84" aria-hidden="true">
        <path class="ghost-body" fill="var(--accent)"
          d="M 25,70 C 25,40 25,20 50,20 C 75,20 75,40 75,70
            Q 66.65,90 58.3,70 Q 50,90 41.7,70 Q 33.35,90 25,70 Z" />
        <ellipse class="ghost-eye" cx="40" cy="46" rx="4" ry="5" fill="var(--bg)" />
        <ellipse class="ghost-eye ghost-eye-r" cx="62" cy="44" rx="5" ry="6" fill="var(--bg)" />
        <ellipse class="ghost-mouth" cx="50" cy="59" rx="6" ry="8" fill="var(--bg)" />
      </svg>
      </div>
      <h1 class="app-name">شقّاقة فنّوش الإلكترونية</h1>
      <p class="greeting">أهلا بالحنشة 👋</p>
      <p class="subtitle">يلا نشوفو قداش ربحت اليوم</p>
    </header>

    <main>
      <section class="card saving-card" aria-label="تسجيل التوفير">
        <label for="amount-input" class="question">قداش وفّرت اليوم؟</label>
        <div class="input-row">
          <input
            type="number"
            id="amount-input"
            inputmode="decimal"
            step="0.001"
            min="0"
            placeholder="0.000"
            aria-label="المبلغ بالدينار"
          >
          <span class="currency">د.ت</span>
        </div>
        <button type="button" id="save-btn" class="save-btn">أرشم 💰</button>
      </section>

      <section class="quote-card" id="quote-card" hidden>
        <p id="quote-text"></p>
      </section>

      <section class="stats" aria-label="الإحصائيات">
        <div class="stats-hero">
          <div class="stat-card stat-hero">
            <span class="stat-label">المجموع</span>
            <span class="stat-value" id="stat-total">0.000 د.ت</span>
          </div>
          <div class="stat-card stat-hero">
            <span class="stat-label">اليوم</span>
            <span class="stat-value" id="stat-today">0.000 د.ت</span>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">أحسن وفرة</span>
            <span class="stat-value" id="stat-best">0.000 د.ت</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">الانتصارات</span>
            <span class="stat-value" id="stat-victories">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">هذا الأسبوع</span>
            <span class="stat-value" id="stat-week">0.000 د.ت · 0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">هذا الشهر</span>
            <span class="stat-value" id="stat-month">0.000 د.ت · 0</span>
          </div>
        </div>
      </section>

      <section class="history" aria-label="السجل">
        <div class="history-header">
          <h2 class="history-title">السجل</h2>
          <button type="button" id="reset-today-btn" class="reset-btn">مسح توفير اليوم</button>
        </div>
        <ul id="history-list" class="history-list">
          ...
        </ul>
      </section>
    </main>

  </div>

  <script src="js/storage.js"></script>
  <script src="js/quotes.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/app.js"></script>

  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
  </script>
</body>
</html>
